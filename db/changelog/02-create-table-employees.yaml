databaseChangeLog:
  - changeSet:
      id: create-table-employees-fix
      author: Shubham
      changes:
        - tagDatabase:
                  tag: version_02
        - createTable:
            schemaName: demo
            tableName: employees
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    nullable: false
